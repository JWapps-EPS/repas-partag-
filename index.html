<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Repas partagé</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f7f5f0;min-height:100vh}
    .container{max-width:520px;margin:0 auto;padding:24px 16px 60px}
    h1{font-size:22px;font-weight:700;color:#1a1a1a}
    .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:20px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
    input,select{padding:11px 12px;border:1.5px solid #e0dbd3;border-radius:8px;font-size:15px;outline:none;background:#faf9f7;width:100%;margin-bottom:10px;display:block}
    .btn{padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;width:100%;display:block;margin-top:4px}
    .btn-orange{background:#e07b39;color:#fff}
    .btn-ghost{background:#f0ece6;color:#555;margin-top:8px}
    .section{margin-bottom:20px}
    .cat-label{font-size:11px;font-weight:700;color:#e07b39;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .row{display:flex;align-items:center;padding:10px 12px;border-radius:8px;background:#fff;margin-bottom:5px;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .row-nom{flex:1;font-size:15px;color:#1a1a1a;font-weight:500}
    .row-qui{font-size:13px;color:#aaa}
    .del{background:none;border:none;color:#ddd;cursor:pointer;font-size:15px;padding:0 4px}
    .empty{text-align:center;color:#bbb;padding:32px 0;font-size:15px}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .admin-badge{font-size:11px;background:#e07b39;color:#fff;padding:3px 10px;border-radius:20px;font-weight:600;display:none}
    .btn-admin-link{background:none;border:none;color:#ccc;font-size:12px;cursor:pointer;text-decoration:underline;padding:0}
    .page-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
    .page-header h1{flex:1;font-size:18px}
    .btn-back{background:none;border:none;color:#e07b39;font-size:15px;font-weight:600;cursor:pointer;padding:0}
    .meta{font-size:13px;color:#888;margin-bottom:16px}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100}
    .modal-bg.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:28px 24px;width:300px;text-align:center}
    .modal h2{font-size:18px;margin-bottom:6px}
    .modal p{font-size:14px;color:#888;margin-bottom:16px}
    .modal input{text-align:center;font-size:24px;letter-spacing:10px}
    .err{color:#e07b39;font-size:13px;margin-bottom:8px;display:none}
    #form-new-repas{display:none}
    #screen-repas{display:none}
  </style>
</head>
<body>
<div class="container">

  <div id="screen-home">
    <div class="top-bar">
      <h1>🍽️ Repas partagés</h1>
      <span id="badge-admin" class="admin-badge">Admin</span>
      <button class="btn-admin-link" onclick="ouvrirModal()">Admin</button>
    </div>
    <div id="form-new-repas" class="card">
      <input id="new-nom" type="text" placeholder="Nom du repas"/>
      <input id="new-date" type="date"/>
      <input id="new-lieu" type="text" placeholder="Lieu (facultatif)"/>
      <button class="btn btn-orange" onclick="creerRepas()">+ Créer ce repas</button>
    </div>
    <div id="liste-repas"><div class="empty">Chargement…</div></div>
  </div>

  <div id="screen-repas">
    <div class="page-header">
      <button class="btn-back" onclick="retourAccueil()">← Retour</button>
      <h1 id="titre-repas"></h1>
    </div>
    <div id="meta-repas" class="meta"></div>
    <div class="card">
      <input id="plat-qui" type="text" placeholder="Ton prénom"/>
      <select id="plat-cat">
        <option>🥗 Entrée</option>
        <option>🍽️ Plat</option>
        <option>🧁 Dessert</option>
        <option>🥤 Boisson</option>
        <option>🍞 Pain</option>
        <option>🧂 Autre</option>
      </select>
      <input id="plat-nom" type="text" placeholder="Ce que tu apportes…" onkeydown="if(event.key==='Enter')ajouterPlat()"/>
      <button class="btn btn-orange" onclick="ajouterPlat()">Ajouter</button>
    </div>
    <div id="liste-plats"><div class="empty">Aucun apport pour l'instant 👆</div></div>
  </div>

</div>

<div id="modal-admin" class="modal-bg">
  <div class="modal">
    <h2>🔐 Accès admin</h2>
    <p>Entre le code pour gérer les repas</p>
    <input id="code-input" type="password" placeholder="••••" maxlength="4" onkeydown="if(event.key==='Enter')validerCode()"/>
    <div id="code-err" class="err">Code incorrect !</div>
    <button class="btn btn-orange" onclick="validerCode()">Valider</button>
    <button class="btn btn-ghost" onclick="fermerModal()">Annuler</button>
  </div>
</div>

<script>
var DB="https://repas-paratge-default-rtdb.europe-west1.firebasedatabase.app";
var CATS=["🥗 Entrée","🍽️ Plat","🧁 Dessert","🥤 Boisson","🍞 Pain","🧂 Autre"];
var CODE="1234";
var isAdmin=false;
var repasActifId=null;
var timerAccueil=null;
var timerRepas=null;

function get(p){return fetch(DB+p+".json").then(function(r){return r.json();});}
function post(p,d){return fetch(DB+p+".json",{method:"POST",body:JSON.stringify(d)}).then(function(r){return r.json();});}
function del(p){return fetch(DB+p+".json",{method:"DELETE"});}

function ouvrirModal(){
  document.getElementById("code-input").value="";
  document.getElementById("code-err").style.display="none";
  document.getElementById("modal-admin").classList.add("open");
  setTimeout(function(){document.getElementById("code-input").focus();},100);
}
function fermerModal(){document.getElementById("modal-admin").classList.remove("open");}
function validerCode(){
  if(document.getElementById("code-input").value===CODE){
    isAdmin=true; fermerModal();
    document.getElementById("form-new-repas").style.display="";
    document.getElementById("badge-admin").style.display="";
    chargerRepas();
  } else {
    document.getElementById("code-err").style.display="";
    document.getElementById("code-input").value="";
  }
}

// Table globale id -> données repas
var repasData={};

function chargerRepas(){
  get("/repas").then(function(data){
    repasData=data||{};
    var liste=document.getElementById("liste-repas");
    var ids=Object.keys(repasData);
    if(ids.length===0){
      liste.innerHTML='<div class="empty">Aucun repas pour l\'instant.</div>';
      return;
    }
    liste.innerHTML="";
    ids.forEach(function(id){
      var r=repasData[id];
      var nb=r.plats?Object.keys(r.plats).length:0;
      var date=r.date?new Date(r.date+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"long"}):"";

      var tr=document.createElement("table");
      tr.style.cssText="width:100%;background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);border-collapse:collapse;cursor:pointer";
      tr.innerHTML='<tr><td style="padding:14px 16px">'
        +'<div style="font-weight:700;font-size:16px;color:#1a1a1a">'+r.nom+'</div>'
        +(date?'<div style="font-size:13px;color:#888;margin-top:3px">'+date+(r.lieu?' · '+r.lieu:'')+'</div>':'')
        +'<div style="font-size:12px;color:#e07b39;font-weight:600;margin-top:4px">'+nb+' apport'+(nb!==1?'s':'')+'</div>'
        +'</td><td style="padding:14px;color:#ccc;font-size:20px;white-space:nowrap">→</td></tr>';

      // onclick inline sur la table avec l'id en dur
      tr.setAttribute("onclick","entrerRepas('"+id+"')");

      liste.appendChild(tr);

      if(isAdmin){
        var d=document.createElement("button");
        d.textContent="🗑 Supprimer";
        d.style.cssText="display:block;width:100%;background:none;border:1px solid #eee;border-radius:8px;padding:6px;font-size:12px;color:#aaa;cursor:pointer;margin-top:-6px;margin-bottom:10px";
        d.setAttribute("onclick","supprimerRepas('"+id+"')");
        liste.appendChild(d);
      }
    });
  });
}

// Appelée depuis onclick inline — id est une string brute
function entrerRepas(id){
  alert("clic sur : "+id);  // DEBUG — à enlever après vérif
  var r=repasData[id];
  if(!r){alert("données introuvables pour "+id);return;}
  ouvrirRepas(id,r);
}

function supprimerRepas(id){
  if(confirm("Supprimer ce repas ?")){del("/repas/"+id).then(chargerRepas);}
}

function ouvrirRepas(id,r){
  repasActifId=id;
  clearInterval(timerAccueil);
  document.getElementById("screen-home").style.display="none";
  document.getElementById("screen-repas").style.display="";
  document.getElementById("titre-repas").textContent=r.nom;
  var date=r.date?new Date(r.date+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"long"}):"";
  document.getElementById("meta-repas").textContent=[date,r.lieu?"📍 "+r.lieu:""].filter(Boolean).join(" · ");
  chargerPlats();
  timerRepas=setInterval(chargerPlats,5000);
}

function chargerPlats(){
  if(!repasActifId) return;
  get("/repas/"+repasActifId+"/plats").then(function(data){
    var liste=document.getElementById("liste-plats");
    var plats=Object.entries(data||{});
    if(plats.length===0){liste.innerHTML='<div class="empty">Aucun apport pour l\'instant 👆</div>';return;}
    liste.innerHTML="";
    CATS.forEach(function(cat){
      var items=plats.filter(function(e){return e[1].cat===cat;});
      if(!items.length) return;
      var sec=document.createElement("div"); sec.className="section";
      var lbl=document.createElement("div"); lbl.className="cat-label"; lbl.textContent=cat;
      sec.appendChild(lbl);
      items.forEach(function(e){
        var pid=e[0],p=e[1];
        var row=document.createElement("div"); row.className="row";
        var n=document.createElement("span"); n.className="row-nom"; n.textContent=p.nom;
        var q=document.createElement("span"); q.className="row-qui"; q.textContent=p.qui;
        var d=document.createElement("button"); d.className="del"; d.textContent="✕";
        d.setAttribute("onclick","supprimerPlat('"+pid+"')");
        row.appendChild(n); row.appendChild(q); row.appendChild(d);
        sec.appendChild(row);
      });
      liste.appendChild(sec);
    });
  });
}

function supprimerPlat(pid){
  del("/repas/"+repasActifId+"/plats/"+pid).then(chargerPlats);
}

function retourAccueil(){
  clearInterval(timerRepas);
  repasActifId=null;
  document.getElementById("screen-repas").style.display="none";
  document.getElementById("screen-home").style.display="";
  chargerRepas();
  timerAccueil=setInterval(chargerRepas,5000);
}

function ajouterPlat(){
  var nom=document.getElementById("plat-nom").value.trim();
  var qui=document.getElementById("plat-qui").value.trim();
  var cat=document.getElementById("plat-cat").value;
  if(!nom||!qui||!repasActifId) return;
  post("/repas/"+repasActifId+"/plats",{nom:nom,qui:qui,cat:cat}).then(function(){
    document.getElementById("plat-nom").value="";
    chargerPlats();
  });
}

function creerRepas(){
  if(!isAdmin) return;
  var nom=document.getElementById("new-nom").value.trim();
  if(!nom) return;
  post("/repas",{nom:nom,date:document.getElementById("new-date").value,lieu:document.getElementById("new-lieu").value.trim()})
    .then(function(){
      document.getElementById("new-nom").value="";
      document.getElementById("new-date").value="";
      document.getElementById("new-lieu").value="";
      chargerRepas();
    });
}

chargerRepas();
timerAccueil=setInterval(chargerRepas,5000);
</script>
</body>
</html>
