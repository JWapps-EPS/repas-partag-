<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debug repas</title>
</head>
<body>
<h2>Test Firebase</h2>
<div id="status">Chargement…</div>
<pre id="result" style="background:#f0f0f0;padding:12px;margin-top:12px;white-space:pre-wrap;word-break:break-all"></pre>

<script>
  var DB = "https://repas-paratge-default-rtdb.europe-west1.firebasedatabase.app";
  var status = document.getElementById("status");
  var result = document.getElementById("result");

  fetch(DB + "/repas.json")
    .then(function(r) {
      status.textContent = "Réponse HTTP : " + r.status;
      return r.text();
    })
    .then(function(text) {
      result.textContent = text;
    })
    .catch(function(err) {
      status.textContent = "ERREUR : " + err.message;
    });
</script>
</body>
</html>
